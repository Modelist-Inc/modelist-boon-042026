<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Modelist &times; Boon Capital Advisors &mdash; Model Portfolio Proposal</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#1B8CA6;--teal-dark:#136a80;--teal-deep:#0d4f61;
  --steel:#4A7FA5;
  --soft-black:#1A1A1A;--slate:#68869A;--slate-lt:#8fa5b4;
  --bg:#FFFFFF;--bg-subtle:#FAFAF8;--bg-panel:#F5F3EF;
  --text:#1A1A1A;--text-muted:#5a6670;--text-faint:#8a939b;
  --border:#E7E5E0;--border-strong:#C8C5BD;--rule:#EDEBE6;
  --eq-color:#1B8CA6;--fi-color:#8f6f55;--alt-color:#3D6B5E;
  --pos:#2E8B7A;--neg:#B4654A;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Lato',-apple-system,sans-serif;color:var(--text);background:var(--bg);line-height:1.55;font-size:14.5px;-webkit-font-smoothing:antialiased}
h2{font-size:30px;font-weight:900;letter-spacing:-.02em;color:var(--soft-black);line-height:1.2}
h3{font-size:19px;font-weight:700;color:var(--soft-black);line-height:1.2}
h4{font-size:14.5px;font-weight:600;color:var(--soft-black);line-height:1.2}
p{color:var(--text)}
.app{display:grid;grid-template-columns:276px 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;background:var(--soft-black);color:#fff;padding:28px 24px 22px;display:flex;flex-direction:column;overflow-y:auto;z-index:10}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:#3a3a3a}
.brand-stack{padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:16px}
.brand-wordmark{font-weight:900;letter-spacing:.22em;font-size:18px;color:#fff;line-height:1}
.brand-sub{font-size:9px;color:var(--slate-lt);letter-spacing:.18em;text-transform:uppercase;margin-top:5px;font-weight:500}
.client-area{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.06)}
.client-area .prep{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px;font-weight:600}
.client-area img{max-height:42px;width:auto;background:rgba(255,255,255,.95);padding:5px 10px;display:block}
.conf-badge{font-size:9px;font-weight:700;letter-spacing:.18em;color:#6ecde6;text-align:center;padding:8px 10px;border:1px solid rgba(27,140,166,.4);background:rgba(27,140,166,.1);margin-bottom:18px;text-transform:uppercase;line-height:1.3}
.nav-title{font-size:10px;color:var(--slate-lt);letter-spacing:.18em;text-transform:uppercase;margin-bottom:12px;font-weight:600}
.nav{list-style:none;flex:1}
.nav-item{display:grid;grid-template-columns:24px 1fr;align-items:center;gap:10px;padding:10px 12px;margin-left:-12px;font-size:13px;color:rgba(255,255,255,.6);cursor:pointer;border-left:2px solid transparent;transition:color .16s,border-color .16s,background .16s;font-weight:500;user-select:none}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.03)}
.nav-item.active{color:#fff;border-left-color:var(--teal);background:rgba(27,140,166,.12)}
.nav-num{font-size:10px;color:var(--slate);font-weight:600;letter-spacing:.08em}
.nav-item.active .nav-num{color:var(--teal)}
.sidebar-foot{font-size:10px;color:var(--slate);letter-spacing:.12em;text-transform:uppercase;padding-top:16px;border-top:1px solid rgba(255,255,255,.08);line-height:1.6;margin-top:auto}
.sidebar-foot strong{color:rgba(255,255,255,.8);display:block;font-size:11px;margin-bottom:3px;letter-spacing:.14em}
.main{min-width:0;background:var(--bg)}
.section{display:none;min-height:100vh;padding:68px 68px 96px;max-width:1280px;animation:fi .3s ease}
.section.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.section-head{margin-bottom:40px;padding-bottom:22px;border-bottom:1px solid var(--rule)}
.eyebrow{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);margin-bottom:12px;display:block}
.section-head .sub{color:var(--text-muted);font-size:16px;margin-top:14px;max-width:760px;line-height:1.55}
.mt-2{margin-top:18px}.mt-4{margin-top:32px}.mt-6{margin-top:48px}
.chart-footnote{font-size:10.5px;color:var(--text-muted);margin-top:14px;line-height:1.55;padding-top:12px;border-top:1px solid var(--rule);font-style:italic}
.chart-footnote strong{color:var(--soft-black);font-weight:600;font-style:normal}
/* Hero */
.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:56px;align-items:start;margin-top:8px}
.hero-bullets{list-style:none;margin:20px 0 0 0}
.hero-bullets li{padding:12px 0;border-top:1px solid var(--rule);display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:start;font-size:14px;line-height:1.5}
.hero-bullets li:last-child{border-bottom:1px solid var(--rule)}
.hero-bullets li .num{font-size:11px;color:var(--teal);font-weight:700;letter-spacing:.08em;padding-top:3px}
.hero-bullets li strong{color:var(--soft-black);font-weight:700}
.hero-right{background:var(--soft-black);color:#fff;padding:36px 34px;position:sticky;top:40px;display:flex;flex-direction:column;justify-content:space-between;position:relative}
.hero-right::before{content:'';display:block;position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--teal),var(--steel))}
.hero-right .tag{font-size:10px;color:var(--teal);letter-spacing:.2em;text-transform:uppercase;font-weight:600;margin-bottom:16px}
.hero-right h3{color:#fff;font-size:20px;line-height:1.25;margin-bottom:12px;font-weight:700}
.hero-right p{color:rgba(255,255,255,.75);font-size:13px;line-height:1.6}
.hero-right .foot{margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,.1);font-size:10px;color:var(--slate-lt);letter-spacing:.12em;text-transform:uppercase}
.hero-right .foot strong{color:#fff;display:block;font-size:11px;margin-bottom:4px}
/* Series tiles */
.series-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.series-tile{background:#fff;border:1px solid var(--border);padding:16px 16px 18px;cursor:pointer;transition:all .18s;position:relative}
.series-tile:hover{border-color:var(--teal);transform:translateY(-1px)}
.series-tile.active{background:var(--teal);border-color:var(--teal);color:#fff;box-shadow:0 8px 24px -12px rgba(27,140,166,.45)}
.series-tile.di-tile{border-top:2px solid rgba(27,140,166,.25)}
.series-tile.active.di-tile{border-top-color:rgba(255,255,255,.3)}
.sname{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--slate);margin-bottom:6px;line-height:1.3}
.series-tile.active .sname{color:rgba(255,255,255,.8)}
.sret{font-size:24px;font-weight:900;color:var(--soft-black);letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1;margin-bottom:3px}
.series-tile.active .sret{color:#fff}
.sdelta{font-size:11px;color:var(--teal);font-weight:600;font-variant-numeric:tabular-nums}
.series-tile.active .sdelta{color:#a8e8f5}
.srisk{margin-top:8px;padding-top:8px;border-top:1px solid var(--rule);font-size:10px;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;font-weight:600}
.series-tile.active .srisk{border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.6)}
.di-badge{position:absolute;top:6px;right:8px;font-size:8px;background:var(--steel);color:#fff;padding:1px 5px;font-weight:700;letter-spacing:.06em}
.series-tile.active .di-badge{background:rgba(255,255,255,.2)}
.series-kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:0;background:#fff;border:1px solid var(--border);margin-bottom:20px}
.series-kpi-row .kpi{padding:16px 18px;border-right:1px solid var(--border)}
.series-kpi-row .kpi:last-child{border-right:0}
.kpi .l{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--slate);margin-bottom:5px}
.kpi .v{font-size:22px;font-weight:900;letter-spacing:-.015em;color:var(--soft-black);font-variant-numeric:tabular-nums;line-height:1}
.kpi .b{font-size:11px;color:var(--text-muted);margin-top:4px;font-variant-numeric:tabular-nums}
.kpi .d{color:var(--teal);font-weight:700}
.chart-wrap{background:var(--bg-subtle);border:1px solid var(--border);padding:22px 26px;margin-bottom:0}
.chart-wrap .hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px}
.chart-wrap h4{font-size:12px;color:var(--slate);letter-spacing:.14em;text-transform:uppercase;font-weight:600}
.sw{font-size:11px;color:var(--text-muted);display:flex;gap:16px;align-items:center}
.sw span{display:inline-flex;align-items:center;gap:6px}
.sw .dot{width:10px;height:3px;display:inline-block}
.chart-canvas{position:relative;width:100%;height:360px}
.chart-canvas svg{width:100%;height:100%;display:block;overflow:visible}
.annual-wrap{background:var(--bg-subtle);border:1px solid var(--border);padding:22px 26px;margin-bottom:20px;border-top:0}
.annual-wrap .hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.annual-wrap h4{font-size:12px;color:var(--slate);letter-spacing:.14em;text-transform:uppercase;font-weight:600}
.series-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:20px}
.series-table th,.series-table td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--rule);font-variant-numeric:tabular-nums}
.series-table th{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);border-bottom:1px solid var(--border-strong)}
.series-table th:first-child,.series-table td:first-child{text-align:left;font-weight:600;color:var(--soft-black)}
.series-table tr:hover td{background:var(--bg-subtle)}
.series-table tr.row-active td{background:rgba(27,140,166,.06);font-weight:600}
.series-table tr.row-active td:first-child{color:var(--teal)}
.series-table .di-row td:first-child{color:var(--text-muted)}
.delta-pos{color:var(--teal);font-weight:600}
.delta-neg{color:#93513b;font-weight:600}
/* Example */
.ex-head{display:grid;grid-template-columns:1fr auto;gap:40px;align-items:end;margin-bottom:28px;padding-bottom:22px;border-bottom:1px solid var(--rule)}
.ex-desc{color:var(--text-muted);max-width:820px;line-height:1.6;font-size:14px}
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:0;background:#fff;border:1px solid var(--border);margin:28px 0 14px}
.kpi-row .kpi{padding:16px 20px;border-right:1px solid var(--border)}
.kpi-row .kpi:last-child{border-right:0}
.panel{background:var(--bg-subtle);border:1px solid var(--border);padding:22px 24px}
.panel-hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px}
.panel-hd .tag{font-size:10px;color:var(--slate);letter-spacing:.14em;text-transform:uppercase;font-weight:600}
.chart-dual{position:relative;width:100%;height:440px}
.chart-dual svg{width:100%;height:100%;display:block;overflow:visible}
.legend{display:flex;gap:22px;font-size:12px;margin-top:12px;color:var(--text-muted);font-weight:500;flex-wrap:wrap}
.legend .dot{width:12px;height:3px;display:inline-block;margin-right:6px;vertical-align:middle}
.pies-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
.pie-card{background:#fff;border:1px solid var(--border);padding:22px 24px}
.pie-card h4{font-size:13px;margin-bottom:16px}
.pie-wrap{display:grid;grid-template-columns:160px 1fr;gap:22px;align-items:center}
.pie-svg{width:160px;height:160px}
.pie-legend{font-size:11.5px;line-height:1.8}
.pie-legend .row{display:grid;grid-template-columns:12px 1fr auto;gap:8px;align-items:center;padding:2px 0}
.pie-legend .sw2{width:10px;height:10px;display:inline-block}
.pie-legend .nm{color:var(--text);font-weight:500}
.pie-legend .wt{color:var(--text-muted);font-weight:600;font-variant-numeric:tabular-nums}
/* Holdings */
.h-table-wrap{background:#fff;border:1px solid var(--border);overflow-x:auto}
.h-table{width:100%;border-collapse:collapse;font-size:13px}
.h-table thead th{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);padding:12px 14px;text-align:right;border-bottom:1px solid var(--border-strong);background:var(--bg-subtle)}
.h-table thead th:first-child,.h-table thead th:nth-child(2){text-align:left}
.h-table tbody td{padding:10px 14px;border-bottom:1px solid var(--rule);text-align:right;font-variant-numeric:tabular-nums}
.h-table tbody td:first-child{text-align:left;font-weight:600;color:var(--teal);font-size:12.5px}
.h-table tbody td:nth-child(2){text-align:left}
.h-table tbody tr:hover td{background:var(--bg-subtle)}
.h-table .cat-row td{background:#fff;border-top:2px solid var(--border-strong);border-bottom:1px solid var(--border);padding:9px 14px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:var(--slate);text-align:left}
.h-table .cat-row td.eq{color:var(--eq-color)}
.h-table .cat-row td.fi{color:var(--fi-color)}
.h-table .cat-row td.alt{color:var(--alt-color)}
.h-table tfoot td{padding:12px 14px;border-top:2px solid var(--border-strong);font-weight:700;font-size:12.5px;text-align:right;background:var(--bg-subtle);font-variant-numeric:tabular-nums}
.h-table tfoot td:first-child{text-align:left;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--slate)}
.hsum-table{width:100%;border-collapse:collapse;font-size:13px}
.hsum-table th{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);padding:12px 14px;text-align:right;border-bottom:1px solid var(--border-strong);background:var(--bg-subtle)}
.hsum-table th:first-child,.hsum-table th:nth-child(2){text-align:left}
.hsum-table td{padding:11px 14px;border-bottom:1px solid var(--rule);text-align:right;font-variant-numeric:tabular-nums}
.hsum-table td:first-child{text-align:left;font-weight:600}
.hsum-table td:nth-child(2){text-align:left;font-size:12px;color:var(--text-muted)}
.hsum-table tr:hover td{background:var(--bg-subtle)}
.hsum-table .di-section{background:rgba(74,127,165,.03)}
.hsum-table .section-sep td{border-top:2px solid var(--border-strong);background:var(--bg-subtle);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--slate);padding:8px 14px;text-align:left!important}
.di-badge-sm{font-size:9px;background:rgba(27,140,166,.12);color:var(--teal);padding:2px 6px;font-weight:700;letter-spacing:.05em;margin-left:6px;vertical-align:middle}
.ar-table{width:100%;border-collapse:collapse;font-size:12.5px}
.ar-table th,.ar-table td{padding:7px 10px;text-align:right;border-bottom:1px solid var(--rule);font-variant-numeric:tabular-nums}
.ar-table th{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);font-weight:600;border-bottom:1px solid var(--border-strong)}
.ar-table td:first-child{text-align:left;font-weight:500}
/* Strategies */
.strat-intro{background:var(--bg-panel);border-left:3px solid var(--teal);padding:22px 28px;margin-bottom:28px}
.strat-intro p{font-size:15px;line-height:1.65;max-width:780px}
.strat-intro strong{color:var(--teal-deep);font-weight:700}
.strat-layout{display:grid;grid-template-columns:260px 1fr;gap:20px;align-items:start}
.strat-list{background:#fff;border:1px solid var(--border);max-height:680px;overflow-y:auto}
.strat-item{display:block;width:100%;text-align:left;background:#fff;border:0;border-bottom:1px solid var(--rule);border-left:3px solid transparent;padding:11px 14px;cursor:pointer;transition:background .14s,border-color .14s;font-family:inherit}
.strat-item:hover{background:var(--bg-subtle)}
.strat-item.active{background:rgba(27,140,166,.06);border-left-color:var(--teal)}
.strat-item.active .si-name{color:var(--teal)}
.si-name{font-size:13px;font-weight:700;color:var(--soft-black);line-height:1.3;margin-bottom:3px}
.si-meta{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.si-tag{font-size:9px;color:var(--slate);letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.si-wt{font-size:11px;color:var(--teal);font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
.strat-detail{background:var(--bg-subtle);border-left:3px solid var(--teal);padding:26px 30px}
.strat-detail h3{font-size:21px;color:var(--teal-deep);margin-bottom:4px}
.s-series{font-size:11px;color:var(--slate);letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-bottom:16px}
.wrow{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px;padding:12px;background:#fff;border:1px solid var(--border)}
.wcell{text-align:center;padding:8px 4px;border-right:1px solid var(--rule)}
.wcell:last-child{border-right:0}
.wcell-label{font-size:9px;color:var(--slate);letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-bottom:5px}
.wcell-val{font-size:17px;font-weight:900;color:var(--teal);font-variant-numeric:tabular-nums}
.wcell.wzero .wcell-val{color:var(--text-faint);font-weight:500}
.s-block{margin-bottom:18px}
.s-lbl{font-size:10px;color:var(--teal);font-weight:700;letter-spacing:.16em;text-transform:uppercase;margin-bottom:7px}
.strat-detail p{font-size:14px;line-height:1.65;max-width:820px}
/* Next steps */
.step-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:36px}
.step-card{background:#fff;border:1px solid var(--border);padding:24px;position:relative}
.step-num{position:absolute;top:18px;right:20px;font-size:32px;font-weight:900;color:var(--border-strong);line-height:1}
.step-card h3{font-size:16px;margin-bottom:10px;padding-right:36px}
.step-card p{font-size:13.5px;color:var(--text-muted);line-height:1.65}
.pricing-block{background:var(--soft-black);color:#fff;padding:36px 44px;position:relative;overflow:hidden;display:flex;gap:36px;align-items:center}
.pricing-block::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--teal),var(--steel))}
.pricing-block .amt{font-size:72px;font-weight:900;letter-spacing:-.04em;line-height:1;color:#fff;flex-shrink:0}
.pricing-block .amt sub{font-size:16px;color:var(--slate-lt);font-weight:400;margin-left:8px;vertical-align:4px}
.pricing-block h3{font-size:22px;color:#fff;margin-bottom:10px}
.pricing-block p{font-size:14px;color:rgba(255,255,255,.75);line-height:1.65}
.pricing-block strong{color:var(--teal)}
/* Regime */
.regime-timeline{position:relative;width:100%;height:120px;margin-bottom:20px}
.regime-timeline svg{width:100%;height:100%;display:block;overflow:visible}
.regime-table-wrap{background:#fff;border:1px solid var(--border);overflow-x:auto;margin-bottom:14px}
.regime-table{width:100%;border-collapse:collapse;font-size:12.5px;font-variant-numeric:tabular-nums}
.regime-table thead th{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);padding:12px 14px;background:var(--bg-subtle);border-bottom:1px solid var(--border-strong);text-align:right;white-space:nowrap}
.regime-table thead th:first-child,.regime-table thead th:nth-child(2){text-align:left}
.regime-table tbody td{padding:11px 14px;border-bottom:1px solid var(--rule);text-align:right}
.regime-table tbody td:first-child,.regime-table tbody td:nth-child(2){text-align:left}
.regime-table tbody tr:hover td{background:var(--bg-subtle)}
.regime-pill{display:inline-block;padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-radius:2px}
.regime-pill.bull{background:rgba(27,140,166,.12);color:var(--teal-deep)}
.regime-pill.bear{background:rgba(180,101,74,.16);color:#93513b}
.capture-good{color:var(--teal);font-weight:700}
.capture-bad{color:#93513b;font-weight:700}
.capture-neutral{color:var(--text);font-weight:600}
/* Disclosures */
.discl-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:0}
.discl-tab{padding:13px 20px;background:transparent;border:0;border-bottom:2px solid transparent;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;transition:color .18s,border-color .18s;font-family:inherit}
.discl-tab:hover{color:var(--teal)}
.discl-tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.discl-body{background:#fff;padding:36px 40px;border:1px solid var(--border);border-top:0;max-height:640px;overflow-y:auto}
.discl-panel{display:none;max-width:780px;font-size:13px;line-height:1.7}
.discl-panel.active{display:block}
.discl-panel h4{font-size:12px;margin:18px 0 8px;text-transform:uppercase;letter-spacing:.1em;color:var(--soft-black)}
.discl-panel h4:first-child{margin-top:0}
.discl-panel p{margin-bottom:12px}
.discl-panel strong{font-weight:700;color:var(--soft-black)}
.discl-panel .defn{display:grid;grid-template-columns:180px 1fr;gap:16px;padding:8px 0;border-top:1px solid var(--rule);font-size:12.5px}
.discl-panel .defn:first-of-type{border-top:0}
.discl-panel .defn dt{font-weight:700;color:var(--teal)}
.discl-panel .defn dd{color:var(--text-muted)}
.platform-table{width:100%;border-collapse:collapse;border:1px solid var(--border);font-size:13.5px;margin-top:8px}
.platform-table thead tr{background:var(--teal)}
.platform-table th{padding:13px 16px;text-align:left;color:#fff;font-size:11px;text-transform:uppercase;letter-spacing:.12em;font-weight:700}
.platform-table th.c{text-align:center}
.platform-table td{padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:top;color:var(--text-muted);line-height:1.55}
.platform-table td:first-child{font-weight:700;color:var(--soft-black);font-size:11px;text-transform:uppercase;letter-spacing:.08em;background:var(--bg-subtle);width:170px}
.platform-table td:not(:first-child){text-align:center}
.check{color:var(--pos);font-size:16px;font-weight:700}
.cross{color:var(--neg);font-size:16px}
.price-val{font-weight:800;font-size:18px;color:var(--teal)}
.tt{position:absolute;background:var(--soft-black);color:#fff;padding:8px 12px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:1000;white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,.15)}
.tt.show{opacity:1}
@media(max-width:1100px){
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;padding:24px}
  .section{padding:48px 36px}
  .hero,.pies-row,.step-grid{grid-template-columns:1fr}
  .series-grid,.strat-layout{grid-template-columns:repeat(2,1fr)}
  .kpi-row,.series-kpi-row{grid-template-columns:repeat(3,1fr)}
}
</style>

const navEl = document.getElementById('nav');
SECTIONS.forEach(s => {
  const li = document.createElement('li');
  li.className = 'nav-item';
  li.dataset.target = s.id;
  li.innerHTML = `<span class="nav-num">${s.num}</span><span>${s.title}</span>`;
  li.addEventListener('click', () => goTo(s.id));
  navEl.appendChild(li);
});

function goTo(id){
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.target === id));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === id));
  window.scrollTo({top:0, behavior:'smooth'});
  if(id==='series' && !window._sInit) initSeries();
  if(id==='example' && !window._eInit) initExample();
  if(id==='example') initRegime();
  if(id==='strategies' && !window._stInit) initStrategies();
  if(id==='holdings') initHoldingsTabs();
}

const main = document.getElementById('main');
main.innerHTML = buildSections();
goTo('intro');
setTimeout(()=>{initSeries();initExample();initStrategies();},100);

      <p><strong>Hypothetical Backtested Performance.</strong> All performance data shown for the Boon Capital Advisors Model Index Designs is hypothetical and backtested. The Model Index Design is a non-investable, hypothetical index constructed by assigning published indexes to a rules-based strategy framework. Results do not represent actual trading and do not reflect the performance of any actual investment account. Backtested results are created with the benefit of hindsight, and there is no guarantee that the strategies would have been implemented as described. Past performance, whether actual or hypothetical, is not indicative of future results.</p>

      <p><strong>Fixed Income Risk:</strong> Fixed income securities are subject to interest rate risk&mdash;as prevailing interest rates rise, the market value of existing bonds typically falls. Fixed income securities are also subject to credit risk, the risk that the issuer may fail to make timely principal or interest payments.</p>
      <p><strong>International and Emerging Market Risk:</strong> Investments in international and emerging market securities involve special risks, including currency fluctuation, political instability, differences in financial reporting standards, and less liquid trading markets.</p>

      <p><strong>Backtesting Risk:</strong> Backtested results are subject to known limitations, including survivorship bias, the benefit of hindsight, and the inability to account for market impact from actual trading. Backtested results should not be interpreted as actual performance.</p>

        <div class="defn"><dt>Annualized Return</dt><dd>The geometric average amount of money earned by an investment each year over a given time period, expressed as a percentage.</dd></div>
        <div class="defn"><dt>Information Ratio</dt><dd>A risk-adjusted performance measure defined as the excess return of an investment divided by the tracking error.</dd></div>

window._sInit=false;
function initSeries(){
  if(window._sInit)return; window._sInit=true;
  const stdGrid=document.getElementById('series-grid-std');
  const diGrid=document.getElementById('series-grid-di');
  DATA.modelsSummary.forEach(m=>{
    const t=document.createElement('div');
    t.className='series-tile'+(m.key==='BCA3'?' active':'')+(m.isDI?' di-tile':'');
    t.dataset.key=m.key;
    function mkDonut(eq,fi,alt,active){
      const tot=eq+fi+alt; let acc=0;
      const slices=[[eq,active?'rgba(255,255,255,.9)':'#1B8CA6'],[fi,active?'rgba(255,255,255,.55)':'#8c6a3d'],[alt,active?'rgba(255,255,255,.35)':'#3D6B5E']];
      const R=28,Ri=16,cx=34,cy=34;
      return slices.map(([v,col])=>{
        if(!v)return '';
        const a0=(acc/tot)*Math.PI*2-Math.PI/2; acc+=v;
        const a1=(acc/tot)*Math.PI*2-Math.PI/2;
        const x0=cx+Math.cos(a0)*R,y0=cy+Math.sin(a0)*R;
        const x1=cx+Math.cos(a1)*R,y1=cy+Math.sin(a1)*R;
        const xi0=cx+Math.cos(a0)*Ri,yi0=cy+Math.sin(a0)*Ri;
        const xi1=cx+Math.cos(a1)*Ri,yi1=cy+Math.sin(a1)*Ri;
        const lg=(v/tot)>0.5?1:0;
        return `<path d="M${x0.toFixed(1)},${y0.toFixed(1)} A${R},${R} 0 ${lg} 1 ${x1.toFixed(1)},${y1.toFixed(1)} L${xi1.toFixed(1)},${yi1.toFixed(1)} A${Ri},${Ri} 0 ${lg} 0 ${xi0.toFixed(1)},${yi0.toFixed(1)} Z" fill="${col}" stroke="rgba(255,255,255,.3)" stroke-width=".5"/>`;
      }).join('');
    }
    const isActive=m.key==='BCA3';
    const donutSvg=`<svg viewBox="0 0 68 68" style="width:68px;height:68px;display:block;margin:6px auto 0;">${mkDonut(m.equityPct,m.fixedPct,m.altPct,isActive)}<text x="34" y="37" text-anchor="middle" font-size="10" font-weight="700" fill="${isActive?'#fff':'#1A1A1A'}" style="font-family:Lato,sans-serif;">${m.riskNum}</text></svg>`;
    t.innerHTML=`${m.isDI?'<span class="di-badge">DI</span>':''}<div class="sname">${m.shortName}</div>${donutSvg}<div class="srisk" style="font-size:9px;margin-top:4px;text-align:center;">Eq ${m.equityPct}% &middot; FI ${m.fixedPct}%</div>`;
    t.addEventListener('click',()=>{
      document.querySelectorAll('.series-tile').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      updateSeriesView(m.key);
    });
    (m.isDI?diGrid:stdGrid).appendChild(t);
  });
  const tbody=document.getElementById('series-tbody');
  const std=DATA.modelsSummary.filter(m=>!m.isDI);
  const di=DATA.modelsSummary.filter(m=>m.isDI);
  const addRow=(m,cls)=>{
    const tr=document.createElement('tr');
    tr.dataset.key=m.key;
    if(m.key==='BCA3')tr.classList.add('row-active');
    if(cls)tr.classList.add(cls);
    const dCls=m.delta>=0?'delta-pos':'delta-neg';
    tr.innerHTML=`<td>${m.name}${m.isDI?'<span class="di-badge-sm">DI</span>':''}</td><td>${m.riskNum}</td><td>${m.annRet.toFixed(2)}%</td><td>${m.benRet.toFixed(2)}%</td><td class="${dCls}">${m.delta>=0?'+':''}${m.delta.toFixed(2)}%</td><td>${m.totRet.toFixed(0)}% <span style="color:var(--text-muted);font-weight:500;font-size:11px;">vs ${m.benTotRet.toFixed(0)}%</span></td><td>${m.stdDev.toFixed(2)}%</td><td>${m.sharpe.toFixed(2)}</td><td>${m.maxDD.toFixed(1)}%</td><td>${m.ir.toFixed(2)}</td>`;
    tbody.appendChild(tr);
  };
  const sep=label=>{const tr=document.createElement('tr');tr.innerHTML=`<td colspan="10" style="background:var(--bg-subtle);border-top:2px solid var(--border-strong);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);padding:8px 12px;">${label}</td>`;tbody.appendChild(tr);};
  sep('Standard ETF Models'); std.forEach(m=>addRow(m,''));
  sep('Direct Indexing Variants'); di.forEach(m=>addRow(m,'di-section'));
  updateSeriesView('BCA3');
}

function updateSeriesView(key){
  const m=DATA.modelsSummary.find(x=>x.key===key);
  document.querySelectorAll('.series-tile').forEach(t=>t.classList.toggle('active',t.dataset.key===key));
  document.querySelectorAll('#series-tbody tr[data-key]').forEach(r=>r.classList.toggle('row-active',r.dataset.key===key));
  document.getElementById('series-chart-title').textContent=`Hypothetical Growth of $1,000 — ${m.name}`;
  document.getElementById('series-annual-title').textContent=`Annual Total Returns — ${m.name} vs Benchmark`;
  document.getElementById('series-annual-mlabel').textContent=m.name;
  const kpis=[
    {l:'Ann. Return',v:`${m.annRet.toFixed(2)}%`,b:`vs ${m.benRet.toFixed(2)}% bench <span class="d">+${m.delta.toFixed(2)}%</span>`},
    {l:'Total Return',v:`${m.totRet.toFixed(0)}%`,b:`vs ${m.benTotRet.toFixed(0)}% bench <span class="d">+${(m.totRet-m.benTotRet).toFixed(0)}%</span>`},
    {l:'Sharpe Ratio',v:`${m.sharpe.toFixed(2)}`,b:`vs ${m.benSharpe.toFixed(2)} bench`},
    {l:'Max Drawdown',v:`${m.maxDD.toFixed(1)}%`,b:`vs ${m.benMaxDD.toFixed(1)}% bench`},
    {l:'Info Ratio',v:`${m.ir.toFixed(2)}`,b:`tracking error ${m.te.toFixed(2)}%`},
    {l:'Final NAV',v:`$${m.finalNAV.toLocaleString()}`,b:`bench $${m.finalBenchNAV.toLocaleString()}`},
  ];
  document.getElementById('series-kpi-row').innerHTML=kpis.map(k=>`<div class="kpi"><div class="l">${k.l}</div><div class="v">${k.v}</div><div class="b">${k.b}</div></div>`).join('');
  document.getElementById('series-sw').innerHTML=`<span><span class="dot" style="background:var(--teal);height:3px;"></span>${m.name}</span><span><span class="dot" style="background:var(--slate);height:3px;border-top:1px dashed var(--slate);"></span>Benchmark</span>`;
  drawSeriesChart(key);
  drawSeriesAnnual(key);
}

function drawSeriesChart(key){
  const navs=DATA.navData[key];
  if(!navs)return;
  const W=960,H=360,pad={t:16,r:60,b:36,l:66};
  const mV=navs.map(d=>d.m),bV=navs.map(d=>d.b);
  const maxY=Math.max(...mV,...bV),minY=900;
  const xS=i=>pad.l+(W-pad.l-pad.r)*(i/(navs.length-1));

function computeFullAnnual(key){
  const navs=DATA.navData[key];
  if(!navs)return DATA.annualReturns[key]||[];
  const byYear={};
  navs.forEach(d=>{const y=d.d.slice(0,4);if(!byYear[y])byYear[y]={first:d,last:d};else byYear[y].last=d;});
  const result=[];
  const years=Object.keys(byYear).sort();
  for(let i=1;i<years.length;i++){
    const y=years[i],prev=byYear[years[i-1]].last,cur=byYear[y].last;
    result.push({y,m:((cur.m/prev.m)-1)*100,b:((cur.b/prev.b)-1)*100});
  }
  const stored=DATA.annualReturns[key]||[];
  const ytd=stored.find(r=>r.y==='YTD');
  if(ytd)result.push(ytd);
  return result;
}

function drawSeriesAnnual(key){
  const ar=computeFullAnnual(key);
  if(!ar)return;
  const mV=ar.map(r=>r.m),bV=ar.map(r=>r.b),years=ar.map(r=>r.y);
  const all=[...mV,...bV],maxV=Math.max(...all,5),minV=Math.min(...all,-5);
  const range=maxV-minV;
  const W=960,H=240,pad={t:16,r:20,b:42,l:44};
  const innerH=H-pad.t-pad.b,groupW=(W-pad.l-pad.r)/years.length,barW=Math.max(6,(groupW-8)/2);
  const yFor=v=>pad.t+innerH*((maxV-v)/range);
  const step=range>40?10:(range>20?5:2);
  const yTicks=[];for(let v=Math.ceil(minV/step)*step;v<=maxV;v+=step)yTicks.push(v);
  const bars=years.map((y,i)=>{
    const x0=pad.l+i*groupW+(groupW-barW*2-2)/2,mv=mV[i],bv=bV[i];
    const mY=yFor(Math.max(0,mv)),mH=Math.abs(yFor(mv)-yFor(0));
    const bY=yFor(Math.max(0,bv)),bH=Math.abs(yFor(bv)-yFor(0));
    return `<rect x="${x0.toFixed(1)}" y="${mY.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(0.5,mH).toFixed(1)}" fill="#1B8CA6"/><rect x="${(x0+barW+2).toFixed(1)}" y="${bY.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(0.5,bH).toFixed(1)}" fill="var(--slate)" opacity=".75"/><text x="${(x0+barW+1).toFixed(1)}" y="${H-pad.b+14}" text-anchor="middle" font-size="10" fill="#8a939b">${y}</text><text x="${(x0+barW/2).toFixed(1)}" y="${(mv>=0?mY-3:mY+mH+10).toFixed(1)}" text-anchor="middle" font-size="8.5" fill="#1B8CA6" font-weight="700">${mv.toFixed(1)}</text><text x="${(x0+barW*1.5+2).toFixed(1)}" y="${(bv>=0?bY-3:bY+bH+10).toFixed(1)}" text-anchor="middle" font-size="8.5" fill="#5a6670" font-weight="600">${bv.toFixed(1)}</text>`;
  }).join('');
  const grid=yTicks.map(v=>`<line x1="${pad.l}" x2="${W-pad.r}" y1="${yFor(v)}" y2="${yFor(v)}" stroke="${v===0?'#C8C5BD':'#EDEBE6'}" stroke-width="${v===0?1:0.6}"/><text x="${pad.l-6}" y="${(yFor(v)+3).toFixed(1)}" text-anchor="end" font-size="10" fill="#8a939b">${v}%</text>`).join('');
  document.getElementById('series-annual-bars').innerHTML=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:240px;display:block;" preserveAspectRatio="xMidYMid meet">${grid}${bars}</svg>`;
}

function drawExRolling(){

  const W=960,H=440,pad={t:16,r:20,b:24,l:50};

function drawPie(id,rows){
  const total=rows.reduce((s,r)=>s+r.wt,0);
  const R=85,r0=48;let a0=-Math.PI/2;
  const paths=rows.map(row=>{
    const frac=row.wt/total,a1=a0+frac*Math.PI*2;
    const x0=Math.cos(a0)*R,y0=Math.sin(a0)*R,x1=Math.cos(a1)*R,y1=Math.sin(a1)*R;
    const xi1=Math.cos(a1)*r0,yi1=Math.sin(a1)*r0,xi0=Math.cos(a0)*r0,yi0=Math.sin(a0)*r0;
    const large=frac>.5?1:0;
    const d=`M${x0.toFixed(2)},${y0.toFixed(2)} A${R},${R} 0 ${large} 1 ${x1.toFixed(2)},${y1.toFixed(2)} L${xi1.toFixed(2)},${yi1.toFixed(2)} A${r0},${r0} 0 ${large} 0 ${xi0.toFixed(2)},${yi0.toFixed(2)} Z`;
    a0=a1;
    return `<path d="${d}" fill="${row.color}" stroke="#fff" stroke-width=".6"><title>${row.name}: ${row.wt}%</title></path>`;
  });
  document.getElementById(id).innerHTML=paths.join('');
}

function initRegime(){
  const navs=DATA.navData['BCA3'];
  if(!navs)return;
  const tlEl=document.getElementById('ex-regime-timeline');
  const tblEl=document.getElementById('ex-regime-table');
  if(!tlEl||!tblEl)return;
  const mNavs=navs.map(d=>d.m),bNavs=navs.map(d=>d.b);
  const regimes=[];
  let mode='bull',startIdx=0,peak=bNavs[0],peakIdx=0,trough=bNavs[0],troughIdx=0;
  for(let i=1;i<bNavs.length;i++){
    const v=bNavs[i];
    if(mode==='bull'){if(v>peak){peak=v;peakIdx=i;}const dd=(v-peak)/peak;if(dd<=-0.10){regimes.push({type:'bull',startIdx,endIdx:peakIdx});mode='bear';startIdx=peakIdx;trough=v;troughIdx=i;}}
    else{if(v<trough){trough=v;troughIdx=i;}if(v>=peak){regimes.push({type:'bear',startIdx,endIdx:troughIdx});mode='bull';startIdx=troughIdx;peak=v;peakIdx=i;}}
  }
  regimes.push({type:mode,startIdx,endIdx:bNavs.length-1,open:true});
  const W=960,H=120,pdg={l:0,r:0,t:20,b:24};
  const n=navs.length;
  const xScale=i=>pdg.l+(W-pdg.l-pdg.r)*(i/(n-1));
  const bands=regimes.map(r=>{
    const x1=xScale(r.startIdx),x2=xScale(r.endIdx);
    const fill=r.type==='bull'?'rgba(27,140,166,.18)':'rgba(180,101,74,.22)';
    return `<rect x="${x1.toFixed(1)}" y="${pdg.t}" width="${Math.max(1,(x2-x1)).toFixed(1)}" height="${H-pdg.t-pdg.b}" fill="${fill}"/>`;
  }).join('');
  const pMax=Math.max(...bNavs),pMin=Math.min(...bNavs);
  const yB=v=>pdg.t+(H-pdg.t-pdg.b)*(1-(v-pMin)/(pMax-pMin))*0.9+4;
  const benchPath=bNavs.map((v,i)=>`${i===0?'M':'L'}${xScale(i).toFixed(1)},${yB(v).toFixed(1)}`).join('');
  const ym=new Map();navs.forEach((d,i)=>{const y=d.d.slice(0,4);if(!ym.has(y))ym.set(y,i);});
  const xY=[...ym.entries()].filter((_,idx)=>idx%3===0);
  tlEl.innerHTML=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${bands}<path d="${benchPath}" fill="none" stroke="#1A1A1A" stroke-width="1.1" opacity=".65"/><text x="2" y="14" font-size="10" fill="#8a939b" letter-spacing="1.4" style="text-transform:uppercase;">Benchmark Path With Regime Overlay</text>${xY.map(([y,i])=>`<text x="${xScale(i).toFixed(1)}" y="${(H-6).toFixed(1)}" text-anchor="middle" font-size="10" fill="#8a939b">${y}</text>`).join('')}</svg>`;
  const rows=regimes.map(r=>{
    const start=navs[r.startIdx].d,end=navs[r.endIdx].d;
    const months=r.endIdx-r.startIdx;
    const mRet=(mNavs[r.endIdx]/mNavs[r.startIdx]-1)*100;
    const bRet=(bNavs[r.endIdx]/bNavs[r.startIdx]-1)*100;
    let capture=null,captureLabel='';
    if(r.type==='bull'){if(bRet>0)capture=(mRet/bRet)*100;captureLabel='Up Capture';}
    else{if(bRet<0)capture=(mRet/bRet)*100;captureLabel='Down Capture';}
    return {r,start,end,months,mRet,bRet,capture,captureLabel};
  });
  tblEl.innerHTML=`<thead><tr><th style="text-align:left;">Regime</th><th style="text-align:left;">Period</th><th>Months</th><th>Benchmark</th><th>Model</th><th>&Delta;</th><th>Capture Ratio</th></tr></thead><tbody>${rows.map((item)=>{ const {r,start,end,months,mRet,bRet,capture,captureLabel}=item;
    const pillCls=r.type==='bull'?'bull':'bear';
    const pillLabel=r.type==='bull'?(r.open?'Bull (Current)':'Bull'):(r.open?'Bear (Current)':'Bear');
    const delta=mRet-bRet;
    let captureHtml='&mdash;',captureCls='capture-neutral';
    if(capture!==null){
      const isGood=(r.type==='bull'&&capture>100)||(r.type==='bear'&&capture<100);
      captureCls=isGood?'capture-good':'capture-bad';
      captureHtml=`${capture.toFixed(0)}% <span style="font-weight:500;color:var(--text-muted);font-size:10.5px;letter-spacing:.06em;">${captureLabel}</span>`;
    }
    return `<tr><td><span class="regime-pill ${pillCls}">${pillLabel}</span></td><td style="color:var(--text-muted);font-size:12px;">${formatDateShort(start)} &ndash; ${formatDateShort(end)}</td><td>${months}</td><td style="color:${bRet>=0?'var(--pos)':'var(--neg)'}">${bRet>=0?'+':''}${bRet.toFixed(1)}%</td><td style="color:${mRet>=0?'var(--pos)':'var(--neg)'}">${mRet>=0?'+':''}${mRet.toFixed(1)}%</td><td style="color:${delta>=0?'var(--pos)':'var(--neg)'};font-weight:600;">${delta>=0?'+':''}${delta.toFixed(1)}%</td><td class="${captureCls}">${captureHtml}</td></tr>`;
  }).join('')}</tbody>`;
}

// ===== STRATEGIES =====
window._stInit=false;
function initStrategies(){
  if(window._stInit)return; window._stInit=true;
  const baseModels=DATA.modelsSummary.filter(m=>!m.isDI);
  const allStrats=[...new Set(baseModels.flatMap(m=>DATA.strategyWeights[m.key].map(s=>s.name)))];
  const list=document.getElementById('strat-list');
  allStrats.forEach((name,idx)=>{
    const weights=baseModels.map(m=>{const s=DATA.strategyWeights[m.key].find(x=>x.name===name);return s?s.wt:0;});
    const totalWt=weights.reduce((a,b)=>a+b,0);
    const info=STRAT_INFO[name]||{series:'Strategy',short:''};
    const btn=document.createElement('button');
    btn.className='strat-item'+(totalWt===0?' strat-zero':'')+(idx===0?' active':'');
    btn.innerHTML=`<div class="si-name">${name}</div><div class="si-meta"><span class="si-tag">${info.series}</span><span class="si-wt">${totalWt>0?`Used: ${weights.filter(w=>w>0).length}/5 models`:'Not in current suite'}</span></div>`;
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.strat-item').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      showStratDetail(name,weights,baseModels,info);
    });
    list.appendChild(btn);
  });
  if(allStrats.length>0){
    const name=allStrats[0];
    const weights=baseModels.map(m=>{const s=DATA.strategyWeights[m.key].find(x=>x.name===name);return s?s.wt:0;});
    showStratDetail(name,weights,baseModels,STRAT_INFO[name]||{series:'Strategy',short:''});
  }
}

function showStratDetail(name,weights,baseModels,info){
  const wrow=baseModels.map((m,i)=>`<div class="wcell${weights[i]===0?' wzero':''}"><div class="wcell-label">${m.shortName.replace(' Conservative','Cons.').replace('Moderately ','Mod. ')}</div><div class="wcell-val">${weights[i]>0?weights[i]+'%':'&mdash;'}</div></div>`).join('');
  document.getElementById('strat-detail').innerHTML=`
    <h3>${name}</h3>
    <div class="s-series">${info.series}</div>
    <div class="wrow">${wrow}</div>
    ${info.short?`<div class="s-block"><div class="s-lbl">Summary</div><p>${info.short}</p></div>`:''}
    ${info.how?`<div class="s-block"><div class="s-lbl">How It Works</div><p>${info.how}</p></div>`:''}
    ${info.why?`<div class="s-block"><div class="s-lbl">Why It's Included</div><p>${info.why}</p></div>`:''}
  `;
}

// ===== HOLDINGS TABS =====
function initHoldingsTabs(){
  const tabsEl=document.getElementById('hold-model-tabs');
  if(!tabsEl||tabsEl._init)return;
  tabsEl._init=true;
  DATA.modelsSummary.forEach((m,i)=>{
    const btn=document.createElement('button');
    btn.style.cssText='padding:7px 14px;font-size:12px;font-weight:600;border:1px solid var(--border);background:#fff;cursor:pointer;font-family:inherit;color:var(--text-muted);transition:all .15s;';
    btn.textContent=m.shortName+(m.isDI?' ⊕':'');
    if(i===2){btn.style.background='var(--teal)';btn.style.color='#fff';btn.style.borderColor='var(--teal)';}
    btn.addEventListener('click',()=>{
      document.querySelectorAll('#hold-model-tabs button').forEach(b=>{b.style.background='#fff';b.style.color='var(--text-muted)';b.style.borderColor='var(--border)';});
      btn.style.background='var(--teal)';btn.style.color='#fff';btn.style.borderColor='var(--teal)';
      renderHoldingsDetail(m.key);
    });
    tabsEl.appendChild(btn);
  });
  renderHoldingsDetail('BCA3');
}

function renderHoldingsDetail(key){
  const m=DATA.modelsSummary.find(x=>x.key===key);
  const hs=DATA.holdingsAll[key].filter(h=>h.ticker&&h.ticker!='nan');
  const cap=document.getElementById('hold-model-caption');
  if(cap)cap.innerHTML=`<strong>${m.name}</strong>${m.isDI?' <span class="di-badge-sm">DI</span>':''} &mdash; ${m.nHoldings} holdings &bull; Wtd Exp: <strong>${m.wtdExp.toFixed(3)}%</strong> &bull; Wtd Yield: <strong>${m.wtdYld.toFixed(2)}%</strong> &bull; As of Mar 31, 2026`;
  let html='<thead><tr><th style="text-align:left;">Ticker</th><th style="text-align:left;">Name</th><th style="text-align:left;">Asset Class</th><th>Weight</th><th>Expense</th><th>Yield</th></tr></thead><tbody>';
  ['Equity','Fixed Income','Alternative'].forEach(c=>{
    const rows=hs.filter(h=>h.cat===c);
    if(!rows.length)return;
    const sub=rows.reduce((s,h)=>s+h.wt,0);
    const cls=c==='Equity'?'eq':c==='Fixed Income'?'fi':'alt';
    html+=`<tr class="cat-row"><td colspan="6" class="${cls}">${c} <span style="color:var(--text-muted);font-weight:500;font-size:10.5px;margin-left:10px;">${rows.length} holdings &middot; ${sub.toFixed(0)}%</span></td></tr>`;
    rows.forEach(h=>{html+=`<tr><td>${h.ticker}</td><td style="font-size:12.5px;">${h.name}</td><td style="font-size:12px;color:var(--text-muted);">${h.ac}</td><td>${h.wt.toFixed(1)}%</td><td>${h.exp.toFixed(3)}%</td><td>${h.yld.toFixed(2)}%</td></tr>`;});
  });
  html+=`</tbody><tfoot><tr><td colspan="3">Aggregate &mdash; Weighted Expense Ratio</td><td>100%</td><td><strong>${m.wtdExp.toFixed(3)}%</strong></td><td></td></tr><tr><td colspan="3">Aggregate &mdash; Weighted 12-Month Yield</td><td></td><td></td><td><strong>${m.wtdYld.toFixed(2)}%</strong></td></tr></tfoot>`;
  document.getElementById('hold-detail-table').innerHTML=html;
}
</script>
